services:
  db:
    image: postgres:17-alpine
    container_name: pickCashDb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pickcash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pickcash}
      POSTGRES_DB: ${POSTGRES_DB:-pick_cash}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pickCashDbData:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pickcash} -d ${POSTGRES_DB:-pick_cash}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pickCashDbData:
